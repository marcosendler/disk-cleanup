# =============================================================================
# /etc/disk-cleanup.conf
# Configuração do serviço de limpeza automática de disco
# =============================================================================
#
# Formato de cada partição:
#   [nome-identificador]
#   target_dir   = /caminho/da/pasta    ← apaga arquivos aqui
#   mount_point  = /ponto/de/montagem   ← mas monitora o uso desta partição
#   threshold_high = 90
#   threshold_low  = 89
#
# Você pode adicionar quantas seções quiser.
# Linhas começando com # são comentários.
# =============================================================================

# --- Partição principal (root) -----------------------------------------------
[gravacoes]
target_dir     = /gravacoes
mount_point    = /gravacoes
threshold_high = 95
threshold_low  = 90

# --- Partição de logs ---------------------------------------------------------
[logs]
target_dir     = /var/log
mount_point    = /var/log
threshold_high = 90
threshold_low  = 85
